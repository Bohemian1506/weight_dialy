name: "app"

services:
  rails-app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile

    volumes:
    - ../../.:/workspaces/.:cached

    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

    # Uncomment the next line to use a non-root user for all processes.
    # user: vscode

    # WSL2 host で動かす ngrok から container 内 Rails に届かせるため、host:3000 に直接 publish する。
    # devcontainer.json の forwardPorts は VS Code (Windows) 側にしか forward されないため不足。
    # Codespace では ports が無視されるが、ローカル Dev Container の動作には影響しない。
    ports:
    - "3000:3000"

    depends_on:
    - postgres

  postgres:
    image: postgres:16.1
    restart: unless-stopped
    networks:
    - default
    volumes:
    - postgres-data:/var/lib/postgresql/data
    environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres

volumes:
  postgres-data:
