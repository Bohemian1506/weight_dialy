# legal 画面 (= privacy + terms) の i18n 抽出 (= Issue #325 パイロット PR)。
# key 命名規約 = <view dir>.<view file>.<section_key>.<item> 形式。
# section_key は番号ではなく意味的キー (= data_collection / purpose / ...) で命名、view 側で見出しに "1. " 等を含めて表示。
ja:
  legal:
    privacy:
      title: "プライバシーポリシー — weight daily."
      h1: "プライバシーポリシー"
      last_updated: "最終更新: 2026年5月6日"
      intro: "weight daily（以下「本サービス」）は、ユーザーから取得する個人情報および利用情報を以下のとおり取り扱います。"
      sections:
        data_collection:
          title: "1. 取得する情報"
          lead: "本サービスは、サービス提供のため以下の情報を取得します。"
          items:
            - "Google アカウントから取得する情報: 氏名、メールアドレス、プロフィール画像"
            - "ユーザーが Apple Shortcuts 経由で送信する情報: 歩数、距離 (m)、上った階数、記録日"
            - "Android アプリ版で Android Health Connect 経由で読み取る情報: 歩数、距離 (m)、上った階数、記録日"
          footer: "いずれの経路でも、取得するのは歩数・距離・階数の 1 日合計値のみです。GPS の位置情報、心拍数の時系列記録、血圧などのセンサーデータは読み取りません。"
        purpose:
          title: "2. 利用目的"
          lead: "取得した情報は、以下の目的にのみ利用します。"
          items:
            - "アプリ画面でのダッシュボード表示"
            - "AI による行動提案メッセージの生成"
          footer: "なお、AI 提案の生成にあたっては、Anthropic 社の API (Claude) に対し、当日の合計歩数・距離・階数から算出した数値情報のみを送信します。氏名、メールアドレス、その他の個人情報は送信しません。"
        third_party:
          title: "3. 第三者提供"
          body_a: "本サービスは、利用者の個人情報を第三者に販売したり、広告目的で提供したりすることはありません。"
          body_b: "ただし、サービスを運営するため、以下のクラウドサービス事業者にデータの保管・処理を委託しています。"
          items:
            - "Render (ホスティング、米国)"
            - "Anthropic (AI による提案メッセージ生成、米国、送信内容は数値情報のみ)"
            - "Google (OAuth 認証時の氏名・メールアドレス取得)"
          footer: "なお、Anthropic 社のサービスにおいて、API 経由で送信されたデータが学習目的に使用されることはありません。"
        retention:
          title: "4. データ保持期間"
          body_a: "取得した情報は、ユーザーが本サービスを利用している期間中保持します。"
          body_b: "ユーザーが退会した場合、当該ユーザーに紐づくすべてのデータ (プロフィール情報、歩数記録、Webhook 配信ログ等) を即時削除します。"
        cookie:
          title: "5. Cookie"
          body: "本サービスは、ログインセッションを維持するための cookie のみを使用します。アクセス解析や広告配信を目的とした cookie は使用していません。"
        user_rights:
          title: "6. ユーザーの権利"
          body: "ユーザーは、設定画面の「アカウント削除」機能から、いつでも自身のアカウントおよび関連データの削除を要求できます。削除は即時実行され、取り消すことはできません。"
        operator:
          title: "7. 運営者"
          body: "本サービスは個人によって運営されています。運営者の氏名は、お問い合わせの際に開示します。"
        contact:
          title: "8. お問い合わせ"
          body: "本ポリシーに関するお問い合わせは、以下のメールアドレスまでご連絡ください。"
        revision:
          title: "9. 改訂"
          body: "本ポリシーの内容を変更する場合があります。重要な変更を行う場合は、本ページの更新に加え、登録メールアドレス宛の通知またはアプリ内通知でお知らせします。"
        revision_history:
          title: "10. 改訂履歴"
          items:
            - date: "2026-05-05"
              description: "初版公開"
            - date: "2026-05-05"
              description: "事業者表示追加・消費者契約法対応"
            - date: "2026-05-06"
              description: "Android Health Connect 経由の取得情報を明記"
    terms:
      title: "利用規約 — weight daily."
      h1: "利用規約"
      last_updated: "最終更新: 2026年5月5日"
      intro: "本利用規約 (以下「本規約」) は、weight daily (以下「本サービス」) の利用条件を定めるものです。本サービスを利用する場合、本規約に同意したものとみなします。"
      sections:
        overview:
          title: "1. サービス概要"
          body: "本サービスは、ユーザーが日常生活で行う身体活動 (歩く、階段を選ぶなど) を可視化し、行動継続を支援する個人開発の Web アプリケーションです。"
        prohibitions:
          title: "2. 禁止事項"
          lead: "ユーザーは、本サービスの利用にあたり、以下の行為を行ってはなりません。"
          items:
            - "他人のアカウントへの不正アクセスまたはなりすまし"
            - "歩数等のデータを偽装する目的での不正な API リクエスト"
            - "法令または公序良俗に反する行為"
            - "本サービスの運営を妨害する行為"
        disclaimer:
          title: "3. 免責事項"
          body_a: "本サービスは、健康増進および行動の可視化を目的とした参考情報を提供するものであり、医療的助言、診断、治療を提供するものではありません。健康に関する判断は、必ず医療従事者にご相談ください。"
          body_b: "本サービスの利用によって生じたいかなる損害についても、運営者は責任を負いません。ただし、運営者の故意又は重過失による場合を除きます。"
        change_termination:
          title: "4. サービス変更・終了"
          body: "本サービスは個人によって運営されており、予告なく機能の変更、停止、または終了を行う場合があります。"
        amendment:
          title: "5. 規約の変更"
          body: "本規約の内容を変更する場合があります。変更後の規約は、本ページに掲載した時点から効力を生じます。"
        governing_law:
          title: "6. 準拠法"
          body: "本規約の解釈および適用は、日本法に準拠します。"
        contact:
          title: "7. お問い合わせ"
          body: "本規約に関するお問い合わせは、以下のメールアドレスまでご連絡ください。"
        revision_history:
          title: "8. 改訂履歴"
          items:
            - date: "2026-05-05"
              description: "初版公開"
            - date: "2026-05-05"
              description: "事業者表示追加・消費者契約法対応"
