# Render Blueprint (Infrastructure as Code).
# 初回デプロイ: Render Dashboard で「New Blueprint」→ 本リポジトリを指定。
# 継続デプロイ: main への push を Render が検知して自動デプロイ。
#
# 環境変数の sync: false は「Render Dashboard で手動入力」の意味 (= secret は YAML に書かない)。
# RAILS_MASTER_KEY: ローカルの config/master.key の中身を Dashboard に貼り付け。
# APP_HOST: Render が発行するドメイン (例: weight-dialy.onrender.com)、確定後に手動設定。

services:
  - type: web
    name: weight-dialy
    runtime: ruby
    region: singapore   # 日本に最も近いリージョン (= Free Tier で選択可能)
    plan: free
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec rails server -p $PORT -e production
    healthCheckPath: /up
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: APP_HOST
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: weight-dialy-db
          property: connectionString
      # [5/10 OOM 対策 #280] Puma を single mode (= workers=0) に変更。
      #
      # 動機: 5/10 09:12 JST に本番インスタンスが OOM (= Free Tier 512MB 超過) でクラッシュ。
      # 原因: workers=1 の cluster mode は master + worker の二重起動になり、Puma 自身が
      #       起動ログで single mode への切り替えを推奨していた (= 警告原文は Issue #280 参照)。
      # 解決: workers=0 (single mode) で master プロセス分のメモリを削減、worker 1 つのみで起動。
      # 安全: 並列性は threads (RAILS_MAX_THREADS=3、puma.rb のデフォルト) で維持されるため性能影響なし。
      #       Connection pool 合計 = 1 process × 3 threads × 4 DB config (= primary/cache/queue/cable)
      #       = max 12 で、Free Postgres の 97 接続上限に余裕で収まる。
      - key: WEB_CONCURRENCY
        value: "0"
      # [5/10 OOM 対策 #281 follow-up] SolidQueue Worker 群を停止 (= 4 プロセス分のメモリ削減)。
      #
      # 動機: Issue #281 の棚卸し調査で weight_dialy は SolidQueue を実質未使用と判明。
      # 原因: app/jobs/ 独自 Job ゼロ + perform_later/perform_now/deliver_later 呼び出し 0 件
      #       + recurring.yml は SolidQueue 自身の自己掃除 job 1 件のみ
      #       (= 4 プロセス常駐が「掃除すべき空テーブルを掃除する」 ためだけの過剰起動)。
      # 解決: "false" に変更して config/puma.rb の `plugin :solid_queue` を無効化し、
      #       SolidQueue 内部プロセス群 (Supervisor / Worker / Dispatcher / Scheduler) の
      #       4 プロセス常駐を停止。puma.rb 側の判定式は `== "true"` 値比較に修正済 (= Issue #284
      #       で「if ENV["X"] は truthy 判定で値による OFF が効かない」 罠回避)。
      # 安全: queue_adapter = :solid_queue は production.rb で残置するため、将来 enqueue が混入
      #       した場合は DB に滞留 (= worker がいないので処理されない) して検知可能。
      #       現状 enqueue ゼロのため、停止する自己掃除 job (= clear_solid_queue_finished_jobs)
      #       にも掃除対象がなく実害なし。
      # 復活: 将来 Job 機能が必要になったら以下 3 ステップ:
      #       (1) 本値を "true" に戻して再デプロイ
      #       (2) `SolidQueue::Job.count` で滞留 job を確認 (= 混入分が積まれていれば初回掃除負荷)
      #       (3) `bin/rails db:migrate` で SolidQueue 関連の追加 migration がないか確認
      #       (= gem / migration / db テーブルは残置なので「ENV 1 行で完結」 が基本)。
      - key: SOLID_QUEUE_IN_PUMA
        value: "false"

databases:
  - name: weight-dialy-db
    plan: free
    databaseName: app_production
    user: app
    region: singapore   # Web Service と同リージョンに揃えてレイテンシ最小化
